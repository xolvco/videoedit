site_name: videoedit
site_description: FFmpeg-backed video editing library and CLI docs
site_url: https://xolvco.github.io/videoedit/
repo_url: https://github.com/xolvco/videoedit
repo_name: xolvco/videoedit
theme:
  name: material
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js
  - javascripts/mermaid-init.js
nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: QUICKSTART.md
      - Concat Playlist Guide: CONCAT_PLAYLIST_GUIDE.md
      - CLI Usage: USAGE.md
      - PowerShell: POWERSHELL.md
      - Bash: BASH.md
  - Commands:
      - Probe: commands/probe.md
      - Validate: commands/validate.md
      - Plan: commands/plan.md
      - Trim: commands/trim.md
      - Concat: commands/concat.md
      - Extract Audio: commands/extract_audio.md
      - Assemble: commands/assemble.md
  - Reference:
      - Manifests: MANIFESTS.md
      - Vision: VISION.md
      - Architecture: ARCHITECTURE.md
      - Architecture Session: ARCHITECTURE_SESSION.md
      - Test Plan: TEST_PLAN.md
      - Contributing Commands: CONTRIBUTING_COMMANDS.md
plugins:
  - search
